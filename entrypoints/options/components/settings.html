<form>
  <s-grid gap="base">
    <s-stack direction="inline" alignItems="center" gap="small-200">
      <s-icon type="store"></s-icon>
      <s-heading>General</s-heading>
    </s-stack>

    <s-section heading="Theme inspector">
      <s-paragraph>Customize how Alfred manages the inspector in theme customizer. Choose to disable it automatically, remember and restore your last state, or let it be.</s-paragraph>
      <s-choice-list
        label="Theme inspector"
        labelAccessibilityVisibility="exclusive"
        name="theme-inspector"
      >
        <s-choice label="Default behavior" value="default" selected details="Alfred will not interfere with the theme inspector."></s-choice>
        <s-choice label="Disable inspector" value="disable" details="Always disable the theme inspector on page load."></s-choice>
        <s-choice label="Restore previous state" value="restore" details="Remember and restore your last inspector state."></s-choice>
      </s-choice-list>
    </s-section>
  </s-grid>
</form>
