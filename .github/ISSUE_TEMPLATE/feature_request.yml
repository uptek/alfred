name: Feature Request
description: Suggest a new feature or improvement
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or use case.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought of?
    validations:
      required: false
  - type: dropdown
    id: contribute
    attributes:
      label: Would you be willing to submit a PR?
      options:
        - 'Yes'
        - 'Maybe, with guidance'
        - 'No'
    validations:
      required: true
